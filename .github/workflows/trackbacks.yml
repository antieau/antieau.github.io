name: Send arXiv trackbacks

on:
  push:
    branches: [master]
    paths:
      - '_posts/**'

  # Allow manual triggering (e.g. for first run with all existing posts)
  workflow_dispatch:

jobs:
  trackbacks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Send trackback pings
        run: python _scripts/send_trackbacks.py

      - name: Commit updated trackbacks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/trackbacks.yml
          git diff --cached --quiet || git commit -m "Update trackback records"
          git push
